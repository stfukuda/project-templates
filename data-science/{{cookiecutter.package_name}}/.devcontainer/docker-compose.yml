version: '3'
services:
  python:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        - VARIANT={{cookiecutter.python_version}}
    working_dir: /workspace

    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - ..:/workspace:cached
    mem_limit: 8g
